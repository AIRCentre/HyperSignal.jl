name: Pluto smoke

# Headlessly evaluate docs/src/notebooks/smoke.jl and assert the
# MIME-rendered HTML for the `div(class="card", "hello")` cell contains
# the expected fragment. Catches regressions in
# Base.show(::IO, ::MIME"text/html", ::Element) before Pluto users do.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docs/src/notebooks/smoke.jl'
      - 'docs/src/notebooks/datastar_responses.jl'
      - '.github/scripts/pluto_smoke.jl'
      - '.github/workflows/pluto-smoke.yml'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'src/**'
              - 'docs/src/notebooks/smoke.jl'
              - 'docs/src/notebooks/datastar_responses.jl'
              - '.github/scripts/pluto_smoke.jl'
              - '.github/workflows/pluto-smoke.yml'
              - 'Project.toml'

  smoke:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - if: needs.changes.outputs.relevant != 'true'
        run: echo "No source/notebook changes; skipping smoke."
      - if: needs.changes.outputs.relevant == 'true'
        uses: actions/checkout@v4
      - if: needs.changes.outputs.relevant == 'true'
        uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - if: needs.changes.outputs.relevant == 'true'
        uses: julia-actions/cache@v2
      - if: needs.changes.outputs.relevant == 'true'
        name: Render smoke.jl and assert smoke fragment
        run: julia --project=. .github/scripts/pluto_smoke.jl
